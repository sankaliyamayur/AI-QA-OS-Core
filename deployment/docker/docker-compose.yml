version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qaos-postgres
    environment:
      POSTGRES_DB: ai_qa_os
      POSTGRES_USER: qaosuser
      POSTGRES_PASSWORD: qaossecurepassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qaos-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: qaos-qdrant
    ports:
      - "6333:6333"

  otel-collector:
    image: otel/opentelemetry-collector:0.95.0
    container_name: qaos-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # gRPC receiver
      - "4318:4318" # HTTP receiver

  gateway:
    build:
      context: ../../
      dockerfile: deployment/docker/gateway.Dockerfile
    container_name: qaos-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ai_qa_os
      - SPRING_DATASOURCE_USERNAME=qaosuser
      - SPRING_DATASOURCE_PASSWORD=qaossecurepassword
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: