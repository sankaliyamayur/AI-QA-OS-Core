apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-qa-os-agents-runtime-hpa
  namespace: ai-qa-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-qa-os-agents-runtime
  minReplicas: 3
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80