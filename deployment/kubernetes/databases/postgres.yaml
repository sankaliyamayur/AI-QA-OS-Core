apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: ai-qa-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: ai_qa_os
        - name: POSTGRES_USER
          value: qaosuser
        - name: POSTGRES_PASSWORD
          value: qaossecurepassword
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: ai-qa-os
spec:
  ports:
  - port: 5432
  selector:
    app: postgres