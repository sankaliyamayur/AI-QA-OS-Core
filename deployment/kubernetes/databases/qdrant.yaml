apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant-vector-db
  namespace: ai-qa-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:v1.9.0
        ports:
        - containerPort: 6333
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: ai-qa-os
spec:
  ports:
  - port: 6333
  selector:
    app: qdrant