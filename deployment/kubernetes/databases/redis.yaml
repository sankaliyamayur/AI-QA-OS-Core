apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: ai-qa-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: ai-qa-os
spec:
  ports:
  - port: 6379
  selector:
    app: redis