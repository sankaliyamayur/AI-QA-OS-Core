server:
  port: 8082

spring:
  application:
    name: ai-qa-os-gateway

aiqaos:
  security:
    database-enabled: false
  cloud:
    gateway:
      routes:
        - id: brain-service
          uri: http://localhost:8081
          predicates:
            - Path=/brain/**
        - id: agent-service
          uri: http://localhost:8082
          predicates:
            - Path=/agents/**
