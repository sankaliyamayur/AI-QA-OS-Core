server:
  port: 8080

spring:
  application:
    name: ai-qa-os-gateway
  cloud:
    gateway:
      routes:
        - id: brain-service
          uri: http://localhost:8081
          predicates:
            - Path=/brain/**
        - id: agent-service
          uri: http://localhost:8082
          predicates:
            - Path=/agents/**
