name: CI/CD Deployment Platform

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean compile -B

  docker-scan-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: |
        docker build -t ghcr.io/company/ai-qa-os-gateway:latest -f deployment/docker/gateway.Dockerfile .
    - name: Trivy Image Vulnerability Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'ghcr.io/company/ai-qa-os-gateway:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'
